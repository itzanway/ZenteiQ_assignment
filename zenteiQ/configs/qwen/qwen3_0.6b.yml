# Qwen3-0.6B Base Config for MaxText
# Run: python MaxText/train.py MaxText/configs/models/qwen3-0.6b.yml \
#        base_output_directory=gs://your-bucket/outputs \
#        run_name=qwen_0.6b_synthetic_cpu \
#        dataset_type=synthetic \
#        steps=50

model_name: qwen3-0.6b
steps: 50
dataset_type: synthetic

# Output settings — override at command line
base_output_directory: /tmp/maxtext_outputs
run_name: qwen_0.6b_cpu_run

# --- Architecture (matches official Qwen3-0.6B) ---
base_num_decoder_layers: 28
base_num_query_heads: 16
base_num_kv_heads: 8                   # GQA: 8 key-value heads
head_dim: 64
base_emb_dim: 1024
base_mlp_dim: 3072
vocab_size: 151936                     # Qwen3 vocabulary

# Attention
attention: autoselected               # picks flash on GPU/TPU, fallback on CPU
max_target_length: 512                # keep short for Colab memory
max_prefill_predict_length: 512

# MLP activation
mlp_activations: ["silu", "linear"]  # SwiGLU / Gated Linear Unit

# Normalization
normalization_layer_epsilon: 1.0e-6
use_pre_norm: true                    # RMSNorm before attention/MLP

# RoPE positional encoding
rope_max_timescale: 1000000           # 1M context base
use_qk_norm: true                     # Qwen3 uses per-head QK normalization

# Training
per_device_batch_size: 2             # conservative for Colab CPU/GPU
learning_rate: 3.0e-4
warmup_steps: 5
adam_b1: 0.9
adam_b2: 0.95
adam_eps: 1.0e-8
weight_decay: 0.1
gradient_clipping_threshold: 1.0

# Dtype
dtype: bfloat16
activations_in_float32: false

# Logging
log_period: 10
metrics_file: ""